
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ModVault | Game Mods Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0b0f14;
        color: #ffffff;
        -webkit-tap-highlight-color: transparent;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "path": "https://esm.sh/path@^0.12.7",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "url": "https://esm.sh/url@^0.11.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <!-- TikTok Bridge UI -->
    <div id="tiktok-bridge" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0f14; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;">
        <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #2563eb, #1d4ed8); border-radius: 20px; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                <polyline points="15 3 21 3 21 9"></polyline>
                <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
        </div>
        <h1 style="font-size: 22px; margin-bottom: 12px; color: white;">For the best experience</h1>
        <p style="font-size: 15px; color: #9ca3af; margin-bottom: 32px; line-height: 1.6; max-width: 300px;">Please open this page in your browser to access all features and secure downloads.</p>
        <a id="chrome-intent-link" href="#" style="display: block; background-color: #2563eb; color: white; text-decoration: none; padding: 18px; border-radius: 14px; font-weight: 600; font-size: 17px; width: 100%; max-width: 300px; box-sizing: border-box;">Open in Chrome</a>
        <div style="position: absolute; bottom: 30px; font-size: 12px; color: #4b5563; text-transform: uppercase; letter-spacing: 0.1em;">ModVault Secure Bridge</div>
    </div>

    <script>
        (function() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isTikTok = ua.toLowerCase().indexOf('tiktok') > -1;
            
            if (isTikTok) {
                const bridge = document.getElementById('tiktok-bridge');
                const root = document.getElementById('root');
                if (bridge && root) {
                    bridge.style.display = 'flex';
                    root.style.display = 'none';
                    
                    const cleanUrl = window.location.host + window.location.pathname;
                    const intentUrl = `intent://${cleanUrl}#Intent;scheme=https;package=com.android.chrome;end`;
                    document.getElementById('chrome-intent-link').href = intentUrl;
                    
                    // Auto-redirect attempt
                    setTimeout(() => {
                        window.location.href = intentUrl;
                    }, 500);
                }
            }
        })();
    </script>

    <div id="root"></div>

    <!-- TikTok Fallback Button -->
    <button id="tiktokOpenBrowserButton" onclick="openInBrowser()">Open in Browser</button>

    <style>
      #tiktokOpenBrowserButton {
        display: none;
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 22px;
        background: #111;
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        z-index: 99999;
        box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      }

      #tiktokOpenBrowserButton:hover {
        opacity: 0.95;
      }
    </style>

    <script>
      function isTikTokBrowser() {
        const ua = navigator.userAgent || "";
        return /TikTok|Bytedance|musical_ly/i.test(ua);
      }

      function openInBrowser() {
        window.open(window.location.href, '_blank');
      }

      document.addEventListener('DOMContentLoaded', function () {
        const btn = document.getElementById('tiktokOpenBrowserButton');
        if (isTikTokBrowser()) {
          btn.style.display = 'block';
        }
      });
    </script>

    <script type="module" src="/index.tsx"></script>
</body>
</html>
